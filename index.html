<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perigee — a daily gravity-slingshot puzzle</title>
    <meta
      name="description"
      content="Aim once, then watch real n-body gravity slingshot your probe around planets to thread today's target."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230a0806'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ffb000'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23ffb000' stroke-width='1.5' stroke-dasharray='3 3'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="wordmark">PERIGEE</h1>
        <button id="mute-toggle" class="icon-btn" aria-label="Mute sound" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              d="M4 9v6h4l5 5V4L8 9H4z"
              fill="currentColor"
            />
            <path
              class="sound-wave"
              d="M16.5 8.5a5 5 0 0 1 0 7"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </header>
      <main class="stage">
        <canvas id="scene" aria-label="Orbital tracking display"></canvas>
        <div id="hud" class="hud" aria-live="polite"></div>
      </main>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
